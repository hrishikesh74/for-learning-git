<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    :root {
      --ink: #111827;
      --muted: #5f6b7a;
      --paper: #fffaf2;
      --rose: #ff6f91;
      --gold: #ffc75f;
      --teal: #00c2a8;
      --blue: #2f80ed;
      --shadow: 0 24px 70px rgba(17, 24, 39, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 15% 20%, rgba(255, 111, 145, 0.22), transparent 32%),
        radial-gradient(circle at 85% 18%, rgba(0, 194, 168, 0.22), transparent 30%),
        linear-gradient(135deg, #fff8ea 0%, #edf7ff 52%, #fff0f4 100%);
    }

    .stage {
      width: min(92vw, 920px);
      min-height: 520px;
      position: relative;
      display: grid;
      place-items: center;
      padding: 48px;
    }

    .hello-card {
      width: min(100%, 680px);
      position: relative;
      z-index: 2;
      padding: clamp(34px, 7vw, 72px);
      border: 1px solid rgba(255, 255, 255, 0.78);
      border-radius: 8px;
      background: rgba(255, 250, 242, 0.78);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      text-align: center;
    }

    .label {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .spark {
      width: 12px;
      height: 12px;
      display: inline-block;
      border-radius: 50%;
      background: var(--teal);
      box-shadow: 0 0 0 7px rgba(0, 194, 168, 0.16);
    }

    h1 {
      margin: 0;
      font-size: clamp(3.6rem, 13vw, 8.7rem);
      line-height: 0.88;
      letter-spacing: 0;
    }

    .world {
      display: block;
      color: transparent;
      background: linear-gradient(90deg, var(--rose), var(--gold), var(--teal), var(--blue));
      background-clip: text;
      -webkit-background-clip: text;
      animation: floatText 4s ease-in-out infinite;
    }

    p {
      max-width: 520px;
      margin: 28px auto 0;
      color: var(--muted);
      font-size: clamp(1rem, 2.5vw, 1.18rem);
      line-height: 1.7;
    }

    .button-row {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 36px;
    }

    .button {
      min-height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 0 20px;
      border: 0;
      border-radius: 8px;
      color: white;
      background: var(--ink);
      box-shadow: 0 12px 30px rgba(17, 24, 39, 0.18);
      font: inherit;
      font-weight: 800;
      text-decoration: none;
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    .button:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 38px rgba(17, 24, 39, 0.24);
    }

    .button.secondary {
      color: var(--ink);
      background: white;
    }

    .shape {
      position: absolute;
      border-radius: 8px;
      opacity: 0.88;
      filter: drop-shadow(0 18px 28px rgba(17, 24, 39, 0.12));
      animation: drift 9s ease-in-out infinite;
    }

    .shape.one {
      width: 115px;
      height: 115px;
      top: 28px;
      left: 30px;
      background: var(--gold);
      transform: rotate(15deg);
    }

    .shape.two {
      width: 78px;
      height: 78px;
      right: 72px;
      top: 82px;
      background: var(--teal);
      animation-delay: -3s;
    }

    .shape.three {
      width: 148px;
      height: 148px;
      right: 18px;
      bottom: 38px;
      background: var(--rose);
      animation-delay: -6s;
    }

    .shape.four {
      width: 86px;
      height: 86px;
      left: 84px;
      bottom: 54px;
      background: var(--blue);
      animation-delay: -1.5s;
    }

    @keyframes floatText {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-10px);
      }
    }

    @keyframes drift {
      0%, 100% {
        transform: translate3d(0, 0, 0) rotate(12deg);
      }
      50% {
        transform: translate3d(12px, -18px, 0) rotate(24deg);
      }
    }

    @media (max-width: 640px) {
      body {
        overflow: auto;
      }

      .stage {
        min-height: 100vh;
        padding: 24px;
      }

      .hello-card {
        padding: 34px 24px;
      }

      .shape {
        opacity: 0.42;
      }

      .button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="stage" aria-label="Fancy hello world page">
    <span class="shape one"></span>
    <span class="shape two"></span>
    <span class="shape three"></span>
    <span class="shape four"></span>

    <section class="hello-card">
      <div class="label"><span class="spark"></span>First page online</div>
      <h1>Hello <span class="world">World</span></h1>
      <p>
        A small page with a big entrance: soft glass, bright color, floating shapes,
        and a friendly little glow to make your first HTML file feel alive.
      </p>
      <div class="button-row">
        <a class="button" href="#" aria-label="Start exploring this page">Start Exploring</a>
        <a class="button secondary" href="#" aria-label="Say hello again">Say Hello Again</a>
      </div>
    </section>
  </main>
</body>
</html>
